# Полный конфиг для IP 5.35.88.205 через sslip.io (без отдельного DNS).
# Сертификат Let’s Encrypt: имя каталога chat.5-35-88-205.sslip.io (SAN + livekit).
#
# Не меняйте server_name на mydomain, если сертификат выпущен на sslip — certbot install не найдёт блок.
#
# Вставка на сервере (одним блоком в терминале):
#   sudo tee /etc/nginx/sites-available/messenger >/dev/null <<'EOF'
#   ... содержимое этого файла ...
#   EOF

upstream messenger_frontend {
  server 127.0.0.1:3020;
}

upstream messenger_livekit {
  server 127.0.0.1:7880;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# --- chat (SPA + /api + /ws) ---
server {
  listen 80;
  listen [::]:80;
  server_name chat.5-35-88-205.sslip.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name chat.5-35-88-205.sslip.io;

  ssl_certificate     /etc/letsencrypt/live/chat.5-35-88-205.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.5-35-88-205.sslip.io/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 100M;

  location / {
    proxy_pass http://messenger_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
}

# --- livekit (wss) ---
server {
  listen 80;
  listen [::]:80;
  server_name livekit.5-35-88-205.sslip.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name livekit.5-35-88-205.sslip.io;

  ssl_certificate     /etc/letsencrypt/live/chat.5-35-88-205.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.5-35-88-205.sslip.io/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location / {
    proxy_pass http://messenger_livekit;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
}
