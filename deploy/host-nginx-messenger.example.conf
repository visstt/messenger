# Пример для nginx на ХОСТЕ (вне Docker): TLS + прокси на опубликованные порты compose.
#
# 1) DNS: A-запись chat.example.com и livekit.example.com → IP сервера.
# 2) Установите nginx и certbot (Debian/Ubuntu):
#    sudo apt install -y nginx certbot python3-certbot-nginx
# 3) Скопируйте этот файл в /etc/nginx/sites-available/messenger, замените example.com,
#    включите сайт: sudo ln -s /etc/nginx/sites-available/messenger /etc/nginx/sites-enabled/
# 4) Сертификат на оба имени сразу (SAN — один fullchain для обоих server):
#    sudo certbot --nginx -d chat.example.com -d livekit.example.com
#    Пути к ключам будут вида /etc/letsencrypt/live/chat.example.com/ — используйте их в обоих блоках ниже.
# 5) В .env для compose задайте APP_ORIGIN и LIVEKIT_PUBLIC_URL как в .env.example
# 6) sudo nginx -t && sudo systemctl reload nginx
#
# Порты по умолчанию в compose: фронт 3020, LiveKit TCP 7880 (см. docker-compose.yml).

upstream messenger_frontend {
  server 127.0.0.1:3020;
}

upstream messenger_livekit {
  server 127.0.0.1:7880;
}

# Основное приложение (SPA + /api через контейнерный nginx)
server {
  listen 80;
  listen [::]:80;
  server_name chat.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name chat.example.com;

  ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 100M;

  location / {
    proxy_pass http://messenger_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# LiveKit: отдельный хост с TLS (wss://). Без этого звонки с https-страницы не подключатся к ws://.
server {
  listen 80;
  listen [::]:80;
  server_name livekit.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name livekit.example.com;

  ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    proxy_pass http://messenger_livekit;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
