# Только HTTP — nginx -t проходит ДО certbot (нет ssl_certificate и options-ssl-nginx.conf).
# Домены sslip.io: chat.5-35-88-205.sslip.io и livekit.5-35-88-205.sslip.io → 5.35.88.205
#
# В chat: Upgrade/Connection только в location /ws (см. nginx-messenger-sslip-full.conf).
#
# После: sudo nginx -t && sudo systemctl reload nginx
# Выполните: sudo certbot --nginx -d chat.5-35-88-205.sslip.io -d livekit.5-35-88-205.sslip.io
# Certbot сам добавит listen 443 ssl и пути к сертификатам.

upstream messenger_frontend {
  server 127.0.0.1:3020;
}

upstream messenger_livekit {
  server 127.0.0.1:7880;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name chat.5-35-88-205.sslip.io;

  client_max_body_size 100M;

  location /ws {
    proxy_pass http://messenger_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://messenger_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name livekit.5-35-88-205.sslip.io;

  location / {
    proxy_pass http://messenger_livekit;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }
}
