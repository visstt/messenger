<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Уведомление</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }

      .toast {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        padding: 12px 40px 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(80, 162, 233, 0.35);
        background: linear-gradient(135deg, #ffffff 0%, #f3f8fd 100%);
        box-shadow:
          0 14px 36px rgba(15, 23, 42, 0.18),
          0 0 0 1px rgba(255, 255, 255, 0.8) inset;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .toast:hover {
        transform: translateY(-1px);
        box-shadow:
          0 18px 40px rgba(15, 23, 42, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .toast__close {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.06);
        color: #64748b;
        font-size: 1.15rem;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background 120ms ease, color 120ms ease;
      }

      .toast__close:hover {
        background: rgba(239, 68, 68, 0.12);
        color: #dc2626;
      }

      .toast__avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #50a2e9, #2f7fc4);
        font-size: 1.1rem;
      }

      .toast__copy {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .toast__title {
        font-size: 0.92rem;
        font-weight: 700;
        color: #0f172a;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .toast__body {
        font-size: 0.82rem;
        color: #475569;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .toast__brand {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #50a2e9;
      }
    </style>
  </head>
  <body>
    <article class="toast" id="toast">
      <button type="button" class="toast__close" id="close" aria-label="Закрыть" title="Закрыть">
        ×
      </button>
      <div class="toast__avatar" id="avatar">S</div>
      <div class="toast__copy">
        <div class="toast__brand">Signal</div>
        <div class="toast__title" id="title">Новое сообщение</div>
        <div class="toast__body" id="body"></div>
      </div>
    </article>
    <script>
      const toast = document.getElementById("toast");
      const closeBtn = document.getElementById("close");
      const titleEl = document.getElementById("title");
      const bodyEl = document.getElementById("body");
      const avatarEl = document.getElementById("avatar");

      window.toastApi.onData((payload) => {
        titleEl.textContent = payload.title || "Signal";
        bodyEl.textContent = payload.body || "";
        const letter = (payload.title || "S").trim().charAt(0).toUpperCase() || "S";
        avatarEl.textContent = letter;
      });

      closeBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        window.toastApi.dismiss();
      });

      toast.addEventListener("click", () => window.toastApi.click());
    </script>
  </body>
</html>
