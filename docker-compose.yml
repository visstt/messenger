services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  livekit:
    image: livekit/livekit-server:latest
    environment:
      # Публичный IPv4 VPS — иначе ICE отдаёт 172.x.x.x и WebRTC не поднимается (pc connection failed).
      NODE_IP: "${LIVEKIT_NODE_IP:-}"
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://messenger:messenger@postgres:5432/messenger?sslmode=disable
      JWT_SECRET: messenger-dev-secret
      APP_ORIGIN: "${APP_ORIGIN:-http://localhost:3020}"
      UPLOAD_DIR: /app/uploads
      S3_ENDPOINT: https://s3.ru1.storage.beget.cloud
      S3_BUCKET_NAME: c15b4d655f70-medvito-data
      S3_ACCESS_KEY: I6I3KOJ2YO3TN08TDJAI
      S3_SECRET_KEY: 5up6F9kLNHRGmPIczdqAVZgBNgKhFpAGJ1JnCJUY
      S3_REGION: ru1
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_PUBLIC_URL: "${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}"
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "9080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3020:80"

volumes:
  postgres-data:
  uploads-data:
